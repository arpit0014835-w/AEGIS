# ────────────────────────────────────────────── 
# AEGIS — Docker Compose 
# ──────────────────────────────────────────────	
version: "3.9"	

services: 
  # ─── Redis ─── 
  redis:	
    image: redis:7-alpine	
    ports: 
      - "6379:6379" 
    volumes:	
      - redis_data:/data	
    healthcheck:	
      test: ["CMD", "redis-cli", "ping"] 
      interval: 10s 
      timeout: 5s 
      retries: 5 
    restart: unless-stopped 

  # ─── Backend API ───	
  backend:	
    build: 
      context: ./backend 
      dockerfile: Dockerfile	
    ports:	
      - "8000:8000" 
    env_file: 
      - .env	
    environment:	
      - REDIS_URL=redis://redis:6379/0	
    depends_on: 
      redis: 
        condition: service_healthy	
    volumes: 
      - ./backend:/app	
      - scan_tmp:/app/tmp	
    restart: unless-stopped 

  # ─── Scan Worker ─── 
  worker:	
    build: 
      context: ./backend	
      dockerfile: Dockerfile 
    command: python -m workers.scan_worker	
    env_file:	
      - .env 
    environment: 
      - REDIS_URL=redis://redis:6379/0	
    depends_on: 
      redis: 
        condition: service_healthy 
    volumes:	
      - ./backend:/app	
      - scan_tmp:/app/tmp 
    restart: unless-stopped 

  # ─── Frontend Dashboard ───	
  frontend: 
    build:	
      context: ./frontend 
      dockerfile: Dockerfile 
    ports:	
      - "3000:3000"	
    environment: 
      - NEXT_PUBLIC_API_URL=http://backend:8000/api/v1	
    depends_on:	
      - backend 
    restart: unless-stopped

volumes:
  redis_data:
  scan_tmp:
